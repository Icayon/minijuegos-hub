name: Update Leaderboard

on:
  issues:
    types: [opened]

jobs:
  update-scores:
    if: startsWith(github.event.issue.title, '[Score]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Process Score Submission
        id: process_score
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const body = process.env.ISSUE_BODY;
          const issueNum = process.env.ISSUE_NUMBER;

          // Regex matching keys
          const gameMatch = body.match(/GAME:\s*([a-zA-Z0-9_-]+)/i);
          const playerMatch = body.match(/PLAYER:\s*([^\r\n]+)/i);
          const scoreMatch = body.match(/SCORE:\s*([0-9.]+)/i);
          const verifMatch = body.match(/VERIFICATION:\s*([a-f0-9]+)/i);

          if (!gameMatch || !playerMatch || !scoreMatch || !verifMatch) {
              console.log("::error::Falta algún parámetro obligatorio en el cuerpo del Issue.");
              process.exit(1);
          }

          const game = gameMatch[1].trim();
          const player = playerMatch[1].trim().substring(0, 15);
          const score = parseFloat(scoreMatch[1].trim());
          const verif = verifMatch[1].trim();

          // DJB2 verification hash logic
          const salt = "ArcadeHubSecretSalt2026!";
          const str = `${game}:${player}:${score}:${salt}`;
          let hash = 5381;
          for (let i = 0; i < str.length; i++) {
              hash = ((hash << 5) + hash) + str.charCodeAt(i);
          }
          const computedHash = (hash >>> 0).toString(16);

          if (computedHash !== verif) {
              console.log("::error::Código de verificación inválido. Anti-trampas activado.");
              process.exit(2);
          }

          // Load leaderboard file
          let leaderboard;
          try {
              leaderboard = JSON.parse(fs.readFileSync("leaderboard.json", "utf8"));
          } catch(e) {
              console.log("::error::No se pudo leer leaderboard.json");
              process.exit(3);
          }

          if (!leaderboard.hasOwnProperty(game)) {
              console.log(`::error::La clave del juego "${game}" no es válida.`);
              process.exit(4);
          }

          // Insert new score
          const newEntry = {
              name: player,
              score: score,
              date: new Date().toISOString().split("T")[0]
          };

          leaderboard[game].push(newEntry);
          // Sort ascending (lower score/time is better)
          leaderboard[game].sort((a, b) => a.score - b.score);
          // Limit to top 10
          leaderboard[game] = leaderboard[game].slice(0, 10);

          // Save leaderboard file
          fs.writeFileSync("leaderboard.json", JSON.stringify(leaderboard, null, 2), "utf8");
          console.log(`Successfully added score for ${player} in ${game}`);
          
          // Output parameters for next steps
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `game=${game}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `player=${player}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `score=${score}\n`);
          '
      
      - name: Commit and Push Changes
        if: success()
        env:
          PLAYER: ${{ steps.process_score.outputs.player }}
          GAME: ${{ steps.process_score.outputs.game }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git commit -m "leaderboard: update score for ${PLAYER} in ${GAME}"
          git push

      - name: Comment and Close Issue (Success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYER: ${{ steps.process_score.outputs.player }}
          GAME: ${{ steps.process_score.outputs.game }}
          SCORE: ${{ steps.process_score.outputs.score }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🏆 ¡Enhorabuena **${PLAYER}**! Tu marca de **${SCORE}** en el juego **${GAME}** ha sido verificada y registrada en la tabla global con éxito."
          gh issue close ${{ github.event.issue.number }} -c "Puntuación añadida y registrada con éxito."

      - name: Comment and Close Issue (Failure)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ **Error de Registro**: La puntuación no ha podido ser verificada. Por favor, asegúrate de no modificar el texto automático del issue o de no hacer trampas. El código de verificación no coincide."
          gh issue close ${{ github.event.issue.number }} -c "Rechazado por fallo de verificación."
